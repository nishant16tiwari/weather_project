<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global AI Radar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <style>
        :root {
            --bg-dark: #060810;
        }

        * { font-family: 'Outfit', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }

        /* ── SYSTEM UI ── */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }

        html, body {
            min-height: 100vh;
            color: #fff;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 50%, #060810 100%);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes floatIn { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scan { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        @keyframes pulseDot { 0% { box-shadow: 0 0 0 0 rgba(var(--dot-rgb), 0.7); } 70% { box-shadow: 0 0 0 20px rgba(var(--dot-rgb), 0); } 100% { box-shadow: 0 0 0 0 rgba(var(--dot-rgb), 0); } }

        .header {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            position: relative;
            animation: floatIn 0.8s ease forwards;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-back {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 24px; border-radius: 16px;
            background: rgba(255,255,255,0.05); color: #fff; font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; text-decoration: none;
            transition: all 0.3s;
        }
        .btn-back:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }

        /* ── MAP CONTAINER ── */
        .map-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px 40px;
            position: relative;
            z-index: 10;
        }

        .map-wrapper {
            position: relative;
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 2 / 1;
            background: url('https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg') no-repeat center;
            background-size: contain;
            opacity: 0.25;
            margin-top: 20px;
            border-radius: 20px;
            animation: floatIn 1s 0.2s ease forwards;
        }

        .scanner-line {
            position: absolute;
            left: 0; width: 100%; height: 2px;
            background: #38bdf8;
            box-shadow: 0 0 20px 5px rgba(56, 189, 248, 0.5);
            animation: scan 3s linear infinite;
            z-index: 2;
        }

        .scanning-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 24px; font-weight: 700; color: #38bdf8;
            text-transform: uppercase; letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.8);
            z-index: 3;
        }

        /* ── CITY DOTS ── */
        .city-marker {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .city-marker:hover { transform: translate(-50%, -50%) scale(1.3); z-index: 10; }

        .dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #fff;
            animation: pulseDot 2s infinite;
        }
        
        .marker-rain { --dot-rgb: 56, 189, 248; .dot { background: #38bdf8; } }
        .marker-clear { --dot-rgb: 251, 191, 36; .dot { background: #fbbf24; } }

        .city-label {
            margin-top: 6px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        .city-marker:hover .city-label { opacity: 1; }
        
        /* ── DATA GRID ── */
        .data-grid-container {
            width: 100%;
            max-width: 1100px;
            margin-top: 40px;
            animation: floatIn 1.2s 0.4s ease forwards;
            display: none;
        }
        .grid-title { font-size: 14px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px;}
        .city-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
        }
        
        .c-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .c-info h3 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .c-info p { font-size: 12px; color: #64748b; }
        
        .c-prob { text-align: right; }
        .c-prob-val { font-size: 24px; font-weight: 800; }
        .c-prob-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-top: 2px;}

    </style>
</head>
<body>

    <div class="header">
        <h1>📡 Global AI Radar</h1>
        <a href="javascript:history.back()" class="btn-back">← Back</a>
    </div>

    <div class="map-section">
        
        <div class="map-wrapper" id="worldMap">
            <div class="scanner-line" id="scanner"></div>
            <div class="scanning-text" id="scanText">Initializing AI Models...</div>
            <!-- Markers go here -->
        </div>

        <!-- SEARCH SECTION -->
        <div style="margin-top: 50px; width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center;">
            <p style="color: #94a3b8; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; font-weight: 700;">Manual Target Acquisition</p>
            <div style="display: flex; width: 100%; gap: 12px; position: relative;">
                <input type="text" id="targetSearch" placeholder="Enter City, Country or Region..." onkeydown="if(event.key === 'Enter') searchTarget()" style="flex: 1; padding: 18px 24px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15,23,42,0.6); color: #fff; font-size: 16px; outline: none; transition: all 0.3s; backdrop-filter: blur(10px);" onfocus="this.style.borderColor='rgba(56, 189, 248, 0.5)'; this.style.boxShadow='0 0 20px rgba(56, 189, 248, 0.2)'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'; this.style.boxShadow='none'">
                <button type="button" class="card" onclick="searchTarget()" style="padding: 0 32px; border-radius: 16px; background: linear-gradient(135deg, #38bdf8, #818cf8); color: #fff; border: none; font-weight: 700; font-size: 16px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 8px 25px rgba(56, 189, 248, 0.3); outline: none;">Analyze Target</button>
            </div>
            <div id="searchStatus" style="margin-top: 16px; font-size: 14px; color: #fbbf24; font-weight: 600; display: none;">Establishing satellite link...</div>
        </div>

        <!-- DATA GRID -->
        <div class="data-grid-container" id="dataSection">
            <div class="grid-title">Live Global Analysis</div>
            <div class="city-cards" id="cityCards"></div>
        </div>

    </div>

<script>
    const map = document.getElementById('worldMap');
    const scanLine = document.getElementById('scanner');
    const scanText = document.getElementById('scanText');
    const dataSec = document.getElementById('dataSection');
    const cityCards = document.getElementById('cityCards');

    // Equirectangular projection mapping logic
    function getMapCoords(lat, lon) {
        const x = ((lon + 180) / 360) * 100;
        const y = ((90 - lat) / 180) * 100;
        return { x, y };
    }

    async function searchTarget() {
        const query = document.getElementById('targetSearch').value.trim();
        if (!query) return;
        
        const status = document.getElementById('searchStatus');
        status.style.display = 'block';
        status.textContent = "Resolving coordinates...";
        status.style.color = "#fbbf24";
        
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`);
            const data = await res.json();
            
            if (data && data.length > 0) {
                const lat = data[0].lat;
                const lon = data[0].lon;
                
                // Show a clean city name
                const displaySplit = data[0].display_name.split(',');
                const cname = displaySplit[0].trim();
                
                status.textContent = "Coordinates locked. Initializing AI prediction engine...";
                status.style.color = "#38bdf8";

                // AJAX Fetch
                const aiRes = await fetch(`/api/predict_single?lat=${lat}&lon=${lon}&city=${encodeURIComponent(cname)}`);
                const aiData = await aiRes.json();
                
                if(aiData.error) throw new Error(aiData.error);
                
                status.textContent = "Target Analyzed Successfully!";
                status.style.color = "#4ade80";
                
                // Plot on Map
                const isRain = aiData.prediction === 'Yes';
                const coords = getMapCoords(parseFloat(lat), parseFloat(lon));
                const marker = document.createElement('div');
                marker.className = `city-marker ${isRain ? 'marker-rain' : 'marker-clear'}`;
                marker.style.left = `${coords.x}%`;
                marker.style.top = `${coords.y}%`;
                marker.innerHTML = `
                    <div class="dot" style="box-shadow: 0 0 14px 4px #fff"></div>
                    <div class="city-label">${isRain ? '🌧️' : '☀️'} ${aiData.name}</div>
                `;
                map.appendChild(marker);
                
                // Add to Grid Top
                const color = isRain ? '#38bdf8' : '#fbbf24';
                const newCardHTML = `
                    <div class="c-card card" style="border: 1px solid ${color}; background: rgba(15,23,42,0.9); animation: floatIn 0.5s ease forwards;">
                        <div class="c-info">
                            <h3 style="color:#fff;">🎯 ${aiData.name}</h3>
                            <p style="color:#e2e8f0; margin-bottom: 2px;">Temp: ${aiData.temp}°C • Hum: ${aiData.humidity}%</p>
                            <p style="color:#94a3b8; font-size:11px;">Wind: ${(aiData.wind * 3.6).toFixed(1)} km/h</p>
                        </div>
                        <div class="c-prob">
                            <div class="c-prob-val" style="color: ${color};">${aiData.probability}%</div>
                            <div class="c-prob-lbl">${isRain ? 'Rain Prob.' : 'Clear Prob.'}</div>
                        </div>
                    </div>
                `;
                cityCards.insertAdjacentHTML('afterbegin', newCardHTML);
                
                // Init Tilt
                VanillaTilt.init(document.querySelectorAll(".card"), { max: 5, speed: 400, glare: true, "max-glare": 0.08 });
                
                setTimeout(() => { status.style.display = 'none'; }, 3500);

            } else {
                status.textContent = "Target location not found. Try another city.";
                status.style.color = "#ef4444";
            }
        } catch (e) {
            status.textContent = "Satellite link failed. Network error.";
            status.style.color = "#ef4444";
        }
    }

    async function fetchGlobalData() {
        try {
            const response = await fetch('/api/global_radar');
            const data = await response.json();
            
            // Stop scanning
            scanLine.style.display = 'none';
            scanText.style.display = 'none';
            map.style.opacity = '1';

            // Plot data
            data.cities.forEach((c, i) => {
                const isRain = c.prediction === 'Yes';
                const coords = getMapCoords(c.lat, c.lon);
                
                // Plot marker
                const marker = document.createElement('div');
                marker.className = `city-marker ${isRain ? 'marker-rain' : 'marker-clear'}`;
                marker.style.left = `${coords.x}%`;
                marker.style.top = `${coords.y}%`;
                marker.style.animationDelay = `${i * 0.1}s`;
                
                marker.innerHTML = `
                    <div class="dot"></div>
                    <div class="city-label">${isRain ? '🌧️' : '☀️'} ${c.name}</div>
                `;
                map.appendChild(marker);

                // Add to Grid
                const color = isRain ? '#38bdf8' : '#fbbf24';
                cityCards.insertAdjacentHTML('beforeend', `
                    <div class="c-card card">
                        <div class="c-info">
                            <h3>${c.name}</h3>
                            <p>${c.country} • ${c.temp}°C</p>
                        </div>
                        <div class="c-prob">
                            <div class="c-prob-val" style="color: ${color};">${c.probability}%</div>
                            <div class="c-prob-lbl">${isRain ? 'Rain Prob.' : 'Clear Prob.'}</div>
                        </div>
                    </div>
                `);
            });

            dataSec.style.display = 'block';

            // Initialize VanillaTilt for the new cards
            VanillaTilt.init(document.querySelectorAll(".card"), { max: 5, speed: 400, glare: true, "max-glare": 0.08 });

        } catch (error) {
            scanText.textContent = "Error Loading Radar Data.";
            scanText.style.color = "#ef4444";
        }
    }

    setTimeout(fetchGlobalData, 1000); // Small delay to let the animation play first

</script>
</body>
</html>
