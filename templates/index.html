<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteorology AI — Premium Rain Prediction</title>
    <meta name="description" content="AI-powered rain prediction using real-time weather data for your location.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <style>
        :root {
            --brand-primary: #38bdf8;
            --brand-secondary: #818cf8;
            --bg-dark: #0f172a;
        }
        * { font-family: 'Outfit', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }

        /* ── SYSTEM UI ── */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }

        html, body {
            min-height: 100vh;
            width: 100vw;
            color: #fff;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #111827, #0f172a);
            background-size: 400% 400%;
            animation: bgAnim 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes bgAnim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── AMBIENT ORBS ── */
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            z-index: 0;
            opacity: 0.5;
            animation: floatOrb 20s infinite ease-in-out alternate;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(56, 189, 248, 0.4); top: -100px; left: -100px; }
        .orb-2 { width: 500px; height: 500px; background: rgba(129, 140, 248, 0.35); bottom: -100px; right: -100px; animation-delay: -5s; }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 120px) scale(1.2); }
        }

        /* ── WEATHER ANIMATIONS ── */
        .bg-clouds {
            position: absolute; top: -10vh; left: 0; width: 200%; height: 50vh;
            background: url("data:image/svg+xml;charset=UTF-8,%3Csvg viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M17.5 19H6.5C3.46243 19 1 16.5376 1 13.5C1 10.7497 3.01815 8.47352 5.66663 8.06456C6.39806 4.60627 9.42629 2 13 2C17.4183 2 21 5.58172 21 10C21 10.1554 20.9956 10.3098 20.9868 10.4631C22.7523 11.2057 24 12.9818 24 15C24 17.2091 22.2091 19 20 19' fill='white'/%3E%3C/svg%3E") repeat-x;
            background-size: 15vw;
            opacity: 0.04;
            animation: driftClouds 60s linear infinite;
            z-index: 0; pointer-events: none;
        }
        @keyframes driftClouds { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .bg-lightning {
            position: fixed; inset: 0; background: #fff; opacity: 0; z-index: 0; pointer-events: none;
            animation: lightningFlash 15s infinite; mix-blend-mode: overlay;
        }
        @keyframes lightningFlash {
            0%, 93%, 100% { opacity: 0; }
            94% { opacity: 0.3; }
            95% { opacity: 0; }
            96% { opacity: 0.7; }
            98% { opacity: 0; }
        }

        .bg-sun-glow {
            position: fixed; top: -100px; left: -100px; width: 50vw; height: 50vh;
            border-radius: 50%; background: radial-gradient(circle, rgba(251,191,36,0.1) 0%, transparent 70%);
            z-index: 0; pointer-events: none; animation: floatSun 10s ease-in-out infinite alternate; filter: blur(40px); mix-blend-mode: screen;
        }
        @keyframes floatSun { 0% { opacity: 0.3; transform: scale(1); } 100% { opacity: 0.8; transform: scale(1.1) translateY(30px); } }

        /* ── AURORA CANVAS ── */
        #auroraCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.7;
            mix-blend-mode: screen;
        }

        /* ── ANIMATIONS ── */
        @keyframes floatIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 20px rgba(56,189,248,0.2); } 50% { box-shadow: 0 0 40px rgba(56,189,248,0.5); } }

        /* ── LAYOUT & CARD ── */
        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: rgba(5, 7, 12, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 48px 40px;
            width: 100%;
            max-width: 520px;
            border-radius: 32px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            animation: floatIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .header-content {
            text-align: center;
            margin-bottom: 36px;
        }

        .app-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--brand-primary);
            margin-bottom: 16px;
        }

        h1 {
            font-size: 38px;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
            max-width: 80%;
            margin: 0 auto;
        }

        /* ── BUTTONS ── */
        .btn-locate {
            width: 100%;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }
        .btn-locate::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(56,189,248,0.1), rgba(129,140,248,0.1));
            opacity: 0; transition: opacity 0.4s;
        }
        .btn-locate:hover {
            border-color: rgba(56,189,248,0.4);
            transform: translateY(-2px);
            background: rgba(255,255,255,0.05);
        }
        .btn-locate:hover::before { opacity: 1; }
        .loc-icon-wrap {
            width: 42px; height: 42px;
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            position: relative; z-index: 1;
        }
        .btn-locate-text { display: flex; flex-direction: column; align-items: flex-start; text-align: left; position: relative; z-index: 1; }
        .btn-locate-title { font-size: 15px; font-weight: 700; color: #e2e8f0; }
        .btn-locate-sub   { font-size: 12px; color: #64748b; margin-top: 2px; }

        .btn-predict {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            color: white;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(56,189,248,0.3);
            position: relative;
            overflow: hidden;
            animation: pulseGlow 3s infinite;
        }
        .btn-predict::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-20deg);
        }
        .btn-predict:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(56,189,248,0.5);
        }
        .btn-predict:hover:not(:disabled)::after {
            animation: shine 1.5s ease;
        }
        @keyframes shine { 100% { left: 200%; } }
        .btn-predict:disabled {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.3);
            box-shadow: none; cursor: not-allowed; animation: none;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* ── STATUS CARD ── */
        .status-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 24px;
            min-height: 90px;
            display: flex;
            align-items: center;
            gap: 16px;
            animation: fadeSlide 0.4s ease;
            transition: all 0.3s;
        }
        .status-icon {
            font-size: 28px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
            width: 48px; height: 48px; display: flex; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.05); border-radius: 50%;
        }
        .status-body { flex: 1; }
        .status-title { font-size: 15px; font-weight: 700; color: #e2e8f0; margin-bottom: 2px; }
        .status-sub   { font-size: 13px; color: #94a3b8; }

        /* ── WEATHER GRID ── */
        .weather-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
            animation: fadeSlide 0.5s ease;
        }
        .wx-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 16px 12px;
            text-align: center;
            transition: all 0.3s;
        }
        .wx-item:hover {
            background: rgba(255,255,255,0.06);
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.1);
        }
        .wx-emoji { font-size: 22px; margin-bottom: 8px; display: block; }
        .wx-val   { font-size: 16px; font-weight: 800; color: #fff; line-height: 1.2; }
        .wx-lbl   { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

        /* ── CITY ROW ── */
        .city-row {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 24px;
            animation: fadeSlide 0.4s ease;
        }
        .city-row:focus-within { border-color: var(--brand-primary); box-shadow: 0 0 15px rgba(56,189,248,0.2); }
        .city-row-icon { color: var(--brand-primary); font-size: 18px; }
        .city-row input {
            flex: 1; background: transparent; border: none; outline: none;
            color: #fff; font-size: 15px; font-weight: 500;
        }
        .city-row input::placeholder { color: #475569; }

        /* ── UI ELEMENTS ── */
        .spinner {
            width: 20px; height: 20px; display: inline-block;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-overlay {
            display: none; position: fixed; inset: 0; z-index: 100;
            background: rgba(6,8,16,0.9); backdrop-filter: blur(12px);
            flex-direction: column; align-items: center; justify-content: center; gap: 24px;
        }
        .loading-overlay.active { display: flex; animation: floatIn 0.3s ease; }
        .loading-ring {
            width: 80px; height: 80px;
            border: 3px solid rgba(255,255,255,0.05);
            border-top-color: var(--brand-primary);
            border-right-color: var(--brand-secondary);
            border-radius: 50%; animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }
        .loading-text { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
        .loading-sub  { font-size: 14px; color: #94a3b8; }

        .error-box {
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
            border-radius: 16px; padding: 16px 20px; color: #fca5a5; font-size: 14px;
            margin-bottom: 24px; display: flex; gap: 12px; align-items: center;
        }
        
        @media (max-width: 600px) {
            .container { padding: 40px 24px; border-radius: 24px; }
            h1 { font-size: 32px; }
            .btn-locate, .btn-predict { padding: 16px; }
        }
    </style>
</head>
<body>

<div class="ambient-orb orb-1"></div>
<div class="ambient-orb orb-2"></div>
<div class="bg-clouds"></div>
<div class="bg-sun-glow"></div>
<div class="bg-lightning"></div>

<canvas id="auroraCanvas"></canvas>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-ring"></div>
    <div class="loading-text">Deep Analysis in Progress…</div>
    <div class="loading-sub">Engineering 100 atmospheric features</div>
</div>

<div class="wrapper">
    <div class="container">
        
        <div class="header-content">
            <div class="app-badge">✨ AI Forecasting</div>
            <h1>Meteorology AI</h1>
            <p class="subtitle">Next-generation weather prediction powered by live atmospheric modeling and machine learning.</p>
        </div>

        {% if error %}
        <div class="error-box"><span>⚠️</span> <span>{{ error }}</span></div>
        {% endif %}

        <button type="button" class="btn-locate" id="locateBtn" onclick="detectLocation()">
            <div class="loc-icon-wrap">📡</div>
            <div class="btn-locate-text">
                <span class="btn-locate-title">Acquire Target Location</span>
                <span class="btn-locate-sub">Ping satellites for precise coordinates</span>
            </div>
        </button>

        <div class="status-card" id="statusCard">
            <div class="status-icon">⏳</div>
            <div class="status-body">
                <div class="status-title">Awaiting Telemetry</div>
                <div class="status-sub">Identify location to establish data link</div>
            </div>
        </div>

        <div class="weather-grid" id="weatherGrid" style="display:none;"></div>

        <form action="/predict" method="POST" id="predictForm">
            <div class="city-row" id="cityRow" style="display:none;">
                <span class="city-row-icon">📍</span>
                <input type="text" name="CityName" id="CityName" placeholder="Identified Region">
            </div>
            <input type="hidden" name="Lat" id="Lat" value="">
            <input type="hidden" name="Lon" id="Lon" value="">

            <button type="submit" class="btn-predict" id="predictBtn" disabled>
                <span id="predictBtnIcon">⚡</span>
                <span id="predictBtnText">Initialize Prediction Matrix</span>
            </button>
        </form>

    </div>
</div>

<script>
// ── AURORA BACKGROUND ANIMATION (similar to result.html) ──
const canvas = document.getElementById('auroraCanvas');
const actx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const auroraColors = [
    [56, 189, 248], // Sky Blue
    [129, 140, 248], // Indigo
    [14, 165, 233], // Ocean
    [99, 102, 241]  // Purple
];

const waves = Array.from({ length: 4 }, (_, i) => ({
    offset:    Math.random() * Math.PI * 2,
    speed:     0.0005 + Math.random() * 0.0005,
    amplitude: 150 + Math.random() * 200,
    yBase:     0.3 + Math.random() * 0.5,
    colorIdx:  i % auroraColors.length,
    alpha:     0.03 + Math.random() * 0.05,
}));

let auroraTime = 0;
function drawAurora() {
    auroraTime++;
    actx.clearRect(0, 0, canvas.width, canvas.height);

    waves.forEach(wave => {
        const [r, g, b] = auroraColors[wave.colorIdx];
        const yCenter = canvas.height * wave.yBase;
        const t = auroraTime * wave.speed + wave.offset;

        actx.save();
        actx.beginPath();

        const pts = 80;
        for (let i = 0; i <= pts; i++) {
            const x = (i / pts) * canvas.width;
            const wobble = Math.sin(i / pts * Math.PI * 3 + t) * wave.amplitude
                         + Math.sin(i / pts * Math.PI * 5 + t * 1.2) * (wave.amplitude * 0.5);
            const y = yCenter + wobble;
            i === 0 ? actx.moveTo(x, y) : actx.lineTo(x, y);
        }

        actx.lineTo(canvas.width, canvas.height);
        actx.lineTo(0, canvas.height);
        actx.closePath();

        const grad = actx.createLinearGradient(0, yCenter - wave.amplitude, 0, canvas.height);
        grad.addColorStop(0, `rgba(${r},${g},${b},${wave.alpha * 1.5})`);
        grad.addColorStop(0.5, `rgba(${r},${g},${b},${wave.alpha})`);
        grad.addColorStop(1, `rgba(${r},${g},${b},0)`);

        actx.fillStyle = grad;
        actx.filter = 'blur(40px)';
        actx.fill();
        actx.restore();
    });

    requestAnimationFrame(drawAurora);
}
drawAurora();

// ── LOGIC ──
function setStatus(icon, title, sub, color = '') {
    document.getElementById('statusCard').innerHTML = `
        <div class="status-icon">${icon}</div>
        <div class="status-body">
            <div class="status-title" style="color:${color || '#e2e8f0'}">${title}</div>
            <div class="status-sub">${sub}</div>
        </div>`;
}

function showWeatherGrid(wx) {
    const grid = document.getElementById('weatherGrid');
    grid.style.display = 'grid';
    grid.innerHTML = `
        <div class="wx-item"><span class="wx-emoji">🌡️</span><div class="wx-val">${wx.temp}°C</div><div class="wx-lbl">Temp</div></div>
        <div class="wx-item"><span class="wx-emoji">💧</span><div class="wx-val">${wx.hum}%</div><div class="wx-lbl">Humidity</div></div>
        <div class="wx-item"><span class="wx-emoji">🌪️</span><div class="wx-val">${wx.pres}</div><div class="wx-lbl">hPa</div></div>
        <div class="wx-item"><span class="wx-emoji">☁️</span><div class="wx-val">${wx.cloud}%</div><div class="wx-lbl">Cloud</div></div>
        <div class="wx-item"><span class="wx-emoji">💨</span><div class="wx-val">${wx.wind}</div><div class="wx-lbl">km/h</div></div>
        <div class="wx-item"><span class="wx-emoji">🌧️</span><div class="wx-val">${wx.precip}</div><div class="wx-lbl">mm</div></div>`;
}

async function detectLocation() {
    const btn = document.getElementById('locateBtn');
    btn.disabled = true;
    btn.innerHTML = `<div class="loc-icon-wrap"><div class="spinner"></div></div><div class="btn-locate-text"><span class="btn-locate-title">Acquiring Telemetry…</span><span class="btn-locate-sub">Please allow browser access</span></div>`;

    if (!navigator.geolocation) {
        setStatus('❌', 'Telemetry Offline', 'Browser does not support GPS detection.', '#f87171');
        btn.disabled = false; return;
    }

    navigator.geolocation.getCurrentPosition(async (pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        document.getElementById('Lat').value = lat;
        document.getElementById('Lon').value = lon;

        setStatus('🌐', 'Connection Established', `Coordinates: ${lat.toFixed(4)}, ${lon.toFixed(4)}. Syncing data...`, '#38bdf8');
        btn.innerHTML = `<div class="loc-icon-wrap">✅</div><div class="btn-locate-text"><span class="btn-locate-title">Location Secured</span><span class="btn-locate-sub">Lat ${lat.toFixed(4)} · Lon ${lon.toFixed(4)}</span></div>`;
        btn.disabled = false;

        try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=relative_humidity_2m,surface_pressure,cloud_cover,precipitation&past_days=0&forecast_days=0&timezone=auto`;
            const res = await fetch(url);
            const data = await res.json();
            const cw = data.current_weather || {};
            const hr = data.hourly || {};
            
            showWeatherGrid({
                temp:   cw.temperature   ?? '–',
                wind:   (cw.windspeed    ?? '–'),
                hum:    hr.relative_humidity_2m?.[0] ?? '–',
                pres:   hr.surface_pressure?.[0]     ?? '–',
                cloud:  hr.cloud_cover?.[0]           ?? '–',
                precip: hr.precipitation?.[0]         ?? '–',
            });
            setStatus('📡', 'Atmospheric Sync Complete', 'Real-time sensor data active. Ready for simulation.', '#34d399');
        } catch(e) {
            setStatus('⚠️', 'Sensor Sync Delayed', 'Coordinates logged. Final data will be pulled on predict.', '#fbbf24');
        }

        try {
            const geoRes = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
            const geoData = await geoRes.json();
            document.getElementById('CityName').value = geoData.city || geoData.locality || geoData.countryName || '';
            document.getElementById('cityRow').style.display = 'flex';
        } catch(e) { document.getElementById('cityRow').style.display = 'flex'; }

        const pBtn = document.getElementById('predictBtn');
        pBtn.disabled = false;
        document.getElementById('predictBtnText').textContent = 'Compute Forecast Simulation';

    }, (err) => {
        setStatus('🔒', 'Access Denied', 'Please grant location permissions to establish uplink.', '#f87171');
        btn.innerHTML = `<div class="loc-icon-wrap">📡</div><div class="btn-locate-text"><span class="btn-locate-title">Retry Acquisition</span><span class="btn-locate-sub">Permissions required</span></div>`;
        btn.disabled = false;
    });
}

document.getElementById('predictForm').addEventListener('submit', function() {
    document.getElementById('loadingOverlay').classList.add('active');
});

VanillaTilt.init(document.querySelector(".container"), {
    max: 3,
    speed: 400,
    glare: true,
    "max-glare": 0.05
});
</script>
